services:
  - type: web
    name: educode-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npx prisma db push --accept-data-loss
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGINS
        value: "*"
      # Neon DATABASE_URL — Render Dashboard'da o'zingiz kiritasiz
      # - key: DATABASE_URL
      #   sync: false
